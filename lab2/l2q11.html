<html>
<head>
  <title>jQuery Chaining</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jquery/3.6.0/jquery.min.js"></script>
  <style>
    body { font-family: Arial; padding: 25px; }
    #panel { width: 300px; background: #1b5e20; color: white; padding: 20px;
             text-align: center; border-radius: 8px; font-size: 18px; margin: 20px 0; }
    button { padding: 10px 20px; background: #bf360c; color: white; border: none; border-radius: 4px; cursor: pointer; }
  </style>
</head>
<body>
  <h2>slideUp & slideDown Chaining Demo</h2>
  <button onclick="runSlide()">Start Animation</button>
  <div id="panel">jQuery Method Chaining!</div>
  <script>
    function runSlide() {
      $("#panel").slideUp(700).delay(300).slideDown(700).delay(300).slideUp(500).delay(200).slideDown(900);
    }
  </script>
</body>
</html>
