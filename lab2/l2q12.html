<!DOCTYPE html>
<html>
<head>
  <title>Image Slider</title>
  <style>
    body { font-family: Arial; text-align: center; padding: 30px; background: #222; color: white; }
    .slider-wrap { position: relative; display: inline-block; }
    #sliderImg { width: 500px; height: 300px; object-fit: cover; border-radius: 10px; display: block; }
    .nav-btn { position: absolute; top: 50%; transform: translateY(-50%); background: rgba(255,255,255,0.3);
               border: none; color: white; font-size: 30px; padding: 10px 18px; cursor: pointer; border-radius: 4px; }
    #btnPrev { left: 10px; } #btnNext { right: 10px; }
    .nav-btn:hover { background: rgba(255,255,255,0.6); }
    #slideInfo { margin-top: 10px; color: #aaa; }
  </style>
</head>
<body>
  <h2>Photo Slider</h2>
  <div class="slider-wrap">
    <img id="sliderImg" src="" alt="Slide">
    <button class="nav-btn" id="btnPrev" onclick="navigate(-1)">&#10094;</button>
    <button class="nav-btn" id="btnNext" onclick="navigate(1)">&#10095;</button>
  </div>
  <p id="slideInfo"></p>
  <script>
    const slideImages = [
    "https://images.unsplash.com/photo-1506744038136-46273834b3fb?w=500&h=300&fit=crop",
    "https://images.unsplash.com/photo-1469474968028-56623f02e42e?w=500&h=300&fit=crop",
    "https://images.unsplash.com/photo-1441974231531-c6227db76b6e?w=500&h=300&fit=crop",
    "https://images.unsplash.com/photo-1501785888041-af3ef285b470?w=500&h=300&fit=crop",
    "https://images.unsplash.com/photo-1470071459604-3b5ec3a7fe05?w=500&h=300&fit=crop"
    ];
    let index = 0;
    function display(i) {
      document.getElementById("sliderImg").src = slideImages[i];
      document.getElementById("slideInfo").innerText = (i+1) + " / " + slideImages.length;
    }
    function navigate(dir) { index = (index + dir + slideImages.length) % slideImages.length; display(index); }
    display(index);
  </script>
</body>
</html>
