<!DOCTYPE html>
<html>
<head>
  <title>AJAX Content Loader</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jquery/3.6.0/jquery.min.js"></script>
  <style>
    body { font-family: Arial; padding: 25px; }
    button { padding: 10px 20px; background: #1b5e20; color: white; border: none; border-radius: 4px; cursor: pointer; }
    #container { margin-top: 20px; padding: 15px; border: 1px solid #ccc; border-radius: 5px; background: #f9f9f9; min-height: 50px; }
  </style>
</head>
<body>
  <h2>Dynamic Content via AJAX</h2>
  <button id="loadBtn">Load Content</button>
  <div id="container">Content will load here...</div>
  <script>
    $(function() {
      $("#loadBtn").click(function() {
        $("#container").html("Loading...");
        $("#container").load("l2q10-data.html", function(res, status, xhr) {
          if (status === "error") $("#container").html("Failed to load: " + xhr.status);
        });
      });
    });
  </script>
</body>
</html>
