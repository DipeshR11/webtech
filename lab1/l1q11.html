<!DOCTYPE html>
<html>
<head>
  <title>Image Display</title>
  <style>
    body { font-family: Arial; text-align: center; padding: 30px; background: #f0f0f0; }
    .card { display: inline-block; margin: 15px; padding: 10px; border: 1px solid #bbb;
            border-radius: 8px; background: white; box-shadow: 2px 2px 8px rgba(0,0,0,0.15); }
    img { max-width: 250px; border-radius: 5px; }
    figcaption { margin-top: 8px; color: #666; font-style: italic; }
  </style>
</head>
<body>
  <h1>Image Showcase</h1>
  <div class="card">
    <figure>
      <img src="L1Q11-photo1.png" alt="Student Photo" width="250">
      <figcaption>Student profile photo</figcaption>
    </figure>
  </div>
  <div class="card">
    <figure>
      <img src="L1Q11-photo2.png" alt="Campus View" width="250">
      <figcaption>Campus View</figcaption>
    </figure>
  </div>
</body>
</html>
