<!DOCTYPE html>
<html>
<head>
  <title>List Box Demo</title>
  <style>
    body { font-family: Verdana; padding: 30px; }
    label { font-weight: bold; display: block; margin: 15px 0 5px; }
    select { padding: 5px; font-size: 15px; }
  </style>
</head>
<body>
  <h2>List Box Demonstration</h2>

  <label>Single Selection:</label>
  <select name="framework" size="5">
    <option>React</option><option>Angular</option>
    <option>Vue</option><option>Svelte</option><option>Next.js</option>
  </select>

  <label>Multiple Selection (hold Ctrl):</label>
  <select name="skills" size="6" multiple>
    <option>Cloud Computing</option><option>Machine Learning</option>
    <option>Cybersecurity</option><option>DevOps</option>
    <option>Data Analytics</option><option>Blockchain</option>
  </select>

  <label>Dropdown:</label>
  <select name="city">
    <option value="">-- Select City --</option>
    <option>Kathmandu</option><option>Pokhara</option><option>Biratnagar</option>
  </select>
</body>
</html>
