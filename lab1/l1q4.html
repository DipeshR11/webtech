<!DOCTYPE html>
<html>
<head>
  <title>CSS Types Demo</title>
  <style>
    h1 { color: darkgreen; text-align: center; }
    .embedded { background: #fff3cd; padding: 10px; border: 1px solid goldenrod; }
  </style>
  <link rel="stylesheet" href="L1Q4.css">
</head>
<body>
  <h1>CSS Types Demonstration</h1>
  <p style="color: purple; font-size: 20px; font-weight: bold;">This paragraph uses INLINE CSS.</p>
  <p class="embedded">This paragraph uses INTERNAL (Embedded) CSS.</p>
  <p class="extcss">This paragraph uses EXTERNAL CSS.</p>
</body>
</html>

L1Q4.css

.extcss {
  color: teal;
  font-size: 18px;
  border-left: 4px solid teal;
  padding-left: 12px;
  background: #e0f7fa;
}
